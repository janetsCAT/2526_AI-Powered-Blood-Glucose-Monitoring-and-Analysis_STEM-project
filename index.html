<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>血糖監測 + 飲食分析平台</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e27;
      --card: #1e2340;
      --border: rgba(255,255,255,0.08);
      --blue: #4facfe;
      --purple: #a855f7;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --teal: #06b6d4;
      --text: #e2e8f0;
      --sub: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* 其餘樣式保持不變（省略以節省篇幅，實際複製時請保留你原本全部 style） */
    /* ...（你的原始 style 內容全部保留）... */
  </style>
</head>
<body>
  <!-- 你的 HTML 結構完全不變（navbar、container、所有 card 等） -->
  <!-- ...（你的原始 body 內容全部保留）... -->

  <div class="toast" id="toast"></div>

  <script>
    // ═══════════════════════════════════════════
    // 全域變數（新增 Cloudflare Workers 代理設定）
    // ═══════════════════════════════════════════
    let glucoseChart = null;
    let glucoseHistory = { time: [], values: [] };
    let blynkTimer = null;
    let blynkConnected = false;
    let foodImageBase64 = null;
    let timeIdx = 0;
    let currentGlucose = 0;
    let aiPlatform = 'deepseek';

    // === Cloudflare Workers 豆包代理設定 ===
    // 請務必把下面網址改成你實際部署的 Worker 網址
    const DOUBAO_WORKER_URL = 'https://你的worker-name.workers.dev';   // ←←← 這裡改成你的真實網址

    // ═══════════════════════════════════════════
    // 血糖狀態更新、走勢圖、Blynk 連接、食物上傳等函數（全部保持不變）
    // ═══════════════════════════════════════════
    // （你的原始這些函數全部保留，我只修改下面兩個豆包相關函數）

    // ═══════════════════════════════════════════
    // 食物分析 - 豆包代理版（已修改）
    // ═══════════════════════════════════════════
    async function callDoubaoFood(apiKey) {
      try {
        const response = await fetch(`${DOUBAO_WORKER_URL}/api/doubao`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
            // Authorization 已由 Worker 處理，前端不再傳 Key
          },
          body: JSON.stringify({
            model: 'doubao-pro',
            messages: [{
              role: 'user',
              content: [
                { type: 'text', text: '你是一位專業營養師。請分析這張食物圖片，輸出以下格式（繁體中文）：\n【食物名稱】\n【估計熱量】kcal\n【蛋白質】g\n【碳水化合物】g\n【脂肪】g\n【GI值】高/中/低\n【血糖影響】\n【建議攝取量】' },
                { type: 'image_url', image_url: { url: foodImageBase64 } }
              ]
            }],
            max_tokens: 500
          })
        });

        if (!response.ok) throw new Error('API error');
        const result = await response.json();
        const text = result.choices[0].message.content;

        document.getElementById('foodResult').innerHTML = `
          <div class="result-box">
            <h4>🔵 豆包分析結果</h4>
            <div class="food-analysis-text">${text.replace(/\n/g, '<br>')}</div>
          </div>
        `;

        showToast('✅ 豆包分析完成', 'success');
        generateFoodRecommend('中');
      } catch (e) {
        document.getElementById('foodResult').innerHTML = '<div class="loading" style="color:#ef4444">❌ API 請求失敗，請檢查 Worker 設定或切換示範模式</div>';
        showToast('❌ 分析失敗', 'error');
      }
    }

    // ═══════════════════════════════════════════
    // AI 血糖分析 - 豆包代理版（已修改）
    // ═══════════════════════════════════════════
    async function callDoubaoBlynk(type, apiKey, customQ = null) {
      try {
        const glucose = currentGlucose || 95;
        const avg = glucoseHistory.values.length > 0
          ? (glucoseHistory.values.reduce((a,b)=>a+b,0)/glucoseHistory.values.length).toFixed(1)
          : 'N/A';

        let userPrompt = customQ
          ? `用戶問題：${customQ}\n當前血糖：${glucose} mg/dL\n請用繁體中文回答。`
          : `血糖分析\n\n當前血糖：${glucose} mg/dL\n今日平均：${avg} mg/dL\n分析類型：${type}\n\n請用繁體中文提供專業健康建議，內容要具體實用。`;

        const response = await fetch(`${DOUBAO_WORKER_URL}/api/doubao`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
            // Authorization 已由 Worker 處理
          },
          body: JSON.stringify({
            model: 'doubao-pro',
            messages: [
              { role: 'system', content: '你是專業的糖尿病健康顧問，用繁體中文回答。' },
              { role: 'user', content: userPrompt }
            ],
            max_tokens: 800
          })
        });

        if (!response.ok) throw new Error('API error');
        const result = await response.json();
        addBlynkMsg('ai', result.choices[0].message.content);
        showToast('✅ 豆包分析完成', 'success');
      } catch (e) {
        addBlynkMsg('ai', '❌ API 請求失敗，請檢查 Worker 設定或切換至示範模式');
        showToast('❌ 分析失敗', 'error');
      }
    }

    // 其餘函數（simulateFoodAnalysis、callDeepSeekFood、callDeepSeekBlynk、runBlynkAI、askBlynkAI 等）全部保持不變
    // （你的原始程式碼繼續保留）

    // ═══════════════════════════════════════════
    // 工具函數與啟動（保持不變）
    // ═══════════════════════════════════════════
    function showToast(msg, type = 'info') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => startDemo(), 500);
    });
  </script>
</body>
</html>
